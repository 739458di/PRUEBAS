<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>FyraChat · Copiloto</title>
<style>
  :root{ --bg:#ffffff; --chatbg:#f7f9fc; --panel:#ffffff; --line:#eceff4;
         --text:#1a2438; --dim:#9aa3b5; --green:#22c55e; --inbub:#ffffff;
         --out:#e9f1fd; --ia:#2f6df0; --acc:#2f6df0; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro',Segoe UI,Roboto,sans-serif;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .24s cubic-bezier(.32,.72,0,1);background:var(--bg)}
  #scr-chat{transform:translateX(100%);background:var(--chatbg)}
  #scr-chat.open{transform:translateX(0)}

  /* ===== LISTA ===== */
  .top{padding:calc(16px + env(safe-area-inset-top)) 20px 4px;display:flex;justify-content:space-between;align-items:center}
  .top h1{font-size:30px;font-weight:800;letter-spacing:-.5px;color:#141d30}
  .top .dot{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5b9ef0,#2f6df0);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(47,109,240,.32)}
  .search{margin:14px 20px 4px;display:flex;align-items:center;gap:9px;background:#f1f4f9;border-radius:13px;padding:11px 14px}
  .search svg{width:17px;height:17px;color:#9aa3b5;flex:none}
  .search input{flex:1;border:none;background:none;outline:none;font-size:15.5px;font-family:inherit;color:var(--text)}
  .search input::placeholder{color:#aab2c2}
  .pills{display:flex;gap:8px;padding:8px 20px;overflow-x:auto}
  .pill{padding:6px 14px;border-radius:16px;background:#f1f4f9;color:var(--dim);font-size:13.5px;font-weight:600;white-space:nowrap;transition:transform .1s}
  .pill:active{transform:scale(.95)}
  .pill.on{background:#e7f0ff;color:var(--acc)}
  #lista{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:2px}
  .chatrow{display:flex;gap:14px;padding:11px 12px;align-items:center;cursor:pointer;position:relative;transition:background .12s;border-radius:16px;margin:1px 8px}
  .chatrow:active{background:#f3f6fb}
  .ava{width:56px;height:56px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;box-shadow:0 4px 12px rgba(70,100,160,.20);position:relative}
  .ava .on{position:absolute;right:1px;bottom:1px;width:14px;height:14px;border-radius:50%;background:var(--green);border:2.5px solid #fff}
  .meta{flex:1;min-width:0}
  .meta .n{font-size:17px;font-weight:700;display:flex;justify-content:space-between;align-items:baseline;color:#1a2438;letter-spacing:-.2px}
  .meta .n time{font-size:13px;color:var(--dim);font-weight:500;flex:none;margin-left:8px}
  .meta .n time.hot{color:var(--acc)}
  .meta .p{font-size:14.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;display:flex;gap:7px;align-items:center}
  .badge-ia{flex:none;background:#e7f0ff;color:var(--acc);font-size:11px;font-weight:700;padding:2px 9px;border-radius:9px}
  .badge-n{flex:none;background:var(--acc);color:#fff;font-size:12px;font-weight:800;min-width:21px;height:21px;padding:0 6px;border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(47,109,240,.3)}
  .chatrow.unread .meta .n span{font-weight:800;color:#0e1626}
  .chatrow.unread .meta .p span{color:#46506a;font-weight:500}

  /* ===== CHAT ===== */
  .chead{display:flex;align-items:center;gap:11px;padding:calc(9px + env(safe-area-inset-top)) 14px 9px;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid #eef1f6;position:relative;z-index:3}
  .back{color:var(--acc);display:flex;align-items:center;padding:8px 6px;margin:-4px;cursor:pointer}
  .back svg{width:12px;height:21px}
  .chead .ava{width:40px;height:40px;font-size:16px}
  .chead .who{flex:1;min-width:0}
  .chead .who b{font-size:16.5px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a2438;letter-spacing:-.2px}
  .chead .who span{font-size:12.5px;color:var(--acc);font-weight:500}
  #msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 6px;display:flex;flex-direction:column;gap:2px;background:var(--chatbg)}
  .bub{max-width:78%;padding:9px 13px 7px;border-radius:19px;font-size:15.5px;line-height:1.4;white-space:pre-wrap;word-break:break-word;position:relative}
  .bub[data-mid]{cursor:pointer}
  .bub.media{padding:5px 5px 4px}
  .bmedia{display:block;max-width:240px;width:100%;border-radius:13px;cursor:pointer}
  .bub .bloc{display:flex;flex-direction:column;line-height:1.35}
  .bub .bloc a{color:#2f6df0;text-decoration:none;font-size:13px;margin-top:3px}
  .bub.sel-obj{box-shadow:0 0 0 2.5px #2f6df0}
  .bub.in.sel-obj{background:#eaf1ff}
  #obj-banner{display:none;align-items:center;gap:8px;margin:0 12px 6px;padding:8px 12px;background:#eaf1ff;border-left:3px solid #2f6df0;border-radius:10px;font-size:13.5px;color:#1f3a66}
  #obj-banner.show{display:flex}
  #obj-banner .ob-ic{color:#2f6df0;font-weight:700}
  #obj-banner #obj-preview{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #obj-banner .ob-x{border:none;background:transparent;color:#5b6b86;font-size:15px;cursor:pointer;padding:2px 4px;line-height:1}
  .in{background:var(--inbub);align-self:flex-start;border-top-left-radius:6px;color:#222e44;box-shadow:0 1px 3px rgba(80,110,170,.10)}
  .out{background:var(--out);align-self:flex-end;border-top-right-radius:6px;color:#13325a}
  .bub.grouped{margin-top:2px}
  .in.grouped{border-top-left-radius:19px}
  .out.grouped{border-top-right-radius:19px}
  .bub.first-of-group{margin-top:10px}
  .bub.anim{animation:bubIn .18s ease-out}
  @keyframes bubIn{from{opacity:0;transform:translateY(7px) scale(.98)}to{opacity:1;transform:none}}
  .bub .t{float:right;font-size:10.5px;color:rgba(40,60,95,.42);margin:7px -3px -1px 9px;font-variant-numeric:tabular-nums;white-space:nowrap}
  /* 🚩 banderita de training: aparece al pasar el mouse sobre la burbuja */
  .bub .flagb{position:absolute;top:-8px;right:-6px;background:#fff;border:1px solid #e3e8f2;border-radius:50%;width:22px;height:22px;font-size:11px;line-height:1;cursor:pointer;opacity:0;transition:opacity .15s;box-shadow:0 1px 4px rgba(20,40,80,.15);padding:0}
  .bub{position:relative}
  .bub:hover .flagb{opacity:.85}
  .bub .flagb.on{opacity:1;background:#fff3d6;border-color:#e8b93f;cursor:default}
  .bub .src{font-size:9.5px;color:rgba(40,60,95,.4);margin-right:6px}
  .daysep{align-self:center;background:rgba(255,255,255,.9);color:#9aa3b5;font-size:11.5px;font-weight:600;padding:4px 13px;border-radius:10px;margin:14px 0 6px;letter-spacing:.4px;box-shadow:0 1px 3px rgba(120,150,200,.12)}
  .tick{display:inline-block;vertical-align:-1px}
  .tick svg{width:16px;height:11px}
  .tick.read svg path{stroke:var(--acc)}

  /* ===== BARRA DE COPILOTO ===== */
  #copilot{background:#fff;border-top:1px solid #eef1f6;padding:13px 16px 11px;display:none;position:relative;z-index:3;box-shadow:0 -6px 20px rgba(90,120,180,.06)}
  #copilot.show{display:block}
  #copilot .tag{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--acc);font-weight:700;letter-spacing:.2px;margin-bottom:8px}
  #copilot .tag .int{background:#e7f0ff;color:#2257c4;padding:1px 9px;border-radius:9px;font-weight:600;font-size:11px}
  #draft{width:100%;background:#f6f8fc;border:1px solid #e6ebf3;color:var(--text);border-radius:15px;padding:12px 14px;font-size:15px;line-height:1.4;font-family:inherit;resize:none;min-height:62px}
  #draft[readonly]{border-color:#eef2f8;background:#f6f8fc}
  .cbtns{margin-top:10px}
  .cb{border:none;cursor:pointer;font-family:inherit;transition:transform .08s ease,opacity .15s}
  .cb:active{transform:scale(.97)}
  /* Acción PRIMARIA: Enviar — grande, full width */
  .cb.send{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:15px;font-size:15.5px;font-weight:700;background:linear-gradient(135deg,#3f86f5,#2f6df0);color:#fff;box-shadow:0 6px 16px rgba(47,109,240,.32)}
  .cb.send svg{width:17px;height:17px}
  /* Acciones SECUNDARIAS: fila discreta */
  .cb-sec{display:flex;gap:8px;margin-top:9px}
  .cb.s{flex:1;padding:10px 0;border-radius:12px;font-size:13.5px;font-weight:600;background:#f1f4f9;color:#6b7589}
  .cb.s.edit{color:var(--acc)}
  .cb.s.no{color:#8a93a6}
  #gen{margin:10px 16px;display:none}
  #gen.show{display:block}
  #gen button{width:100%;padding:13px;border:1px dashed #b9cdf5;background:rgba(47,109,240,.05);color:var(--acc);border-radius:14px;font-size:14.5px;font-weight:700;cursor:pointer}
  /* SECUENCIA del banco: cada mensaje se envía por separado (enviar, enviar, enviar) */
  #seqbox{background:#fff;border-top:1px solid #eef1f6;padding:11px 14px 12px;display:none;position:relative;z-index:3;box-shadow:0 -6px 20px rgba(90,120,180,.06);max-height:46vh;overflow-y:auto}
  #seqbox.show{display:block}
  #seqbox .seqtag{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--acc);font-weight:700;margin-bottom:9px}
  #seqbox .seqtag .int{background:#e7f0ff;color:#2257c4;padding:1px 9px;border-radius:9px;font-weight:600;font-size:11px;margin-left:auto}
  .seqcard{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;transition:opacity .2s}
  .seqcard .seqn{flex:none;width:21px;height:21px;margin-top:6px;border-radius:50%;background:#eaf1ff;color:#2f6df0;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .seqtx{flex:1;min-width:0;resize:none;border:1px solid #e3e8f1;border-radius:13px;padding:9px 12px;font-family:inherit;font-size:14.5px;line-height:1.32;color:#13233d;background:#f7f9fc;overflow:hidden}
  .seqtx:focus{outline:none;border-color:#9cc0ff;background:#fff}
  .seqbtn{flex:none;align-self:stretch;min-width:74px;border:none;border-radius:13px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3f86f5,#2f6df0);box-shadow:0 4px 12px rgba(47,109,240,.28);transition:transform .08s}
  .seqbtn:active{transform:scale(.96)}
  .seqcard.sent{opacity:.5}
  .seqcard.sent .seqtx{background:#eef7ee;border-color:#cfe8cf;color:#5a7a5a}
  .seqcard.sent .seqn{background:#dff0df;color:#2f9d52}
  .seqcard.sent .seqbtn{background:#cfe6d2;color:#2f9d52;box-shadow:none;cursor:default}
  .seqfoot{margin-top:4px}
  .seqfoot button{width:100%;padding:9px 0;border-radius:12px;font-size:13px;font-weight:600;background:#f1f4f9;color:#8a93a6;border:none;cursor:pointer}

  /* ===== INPUT MANUAL ===== */
  .inputbar{display:flex;gap:9px;align-items:flex-end;padding:9px 12px calc(9px + env(safe-area-inset-bottom));background:rgba(255,255,255,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid #eef1f6}
  #manual{flex:1;background:#f1f4f9;border:1px solid #e8edf4;color:var(--text);border-radius:21px;padding:11px 16px;font-size:15.5px;font-family:inherit;resize:none;max-height:90px}
  #manual::placeholder{color:#aab2c2}
  #sendman{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#3f86f5,#2f6df0);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;box-shadow:0 5px 14px rgba(47,109,240,.4)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(28,38,58,.95);backdrop-filter:blur(10px);color:#fff;padding:11px 18px;border-radius:14px;font-size:13.5px;z-index:99;box-shadow:0 10px 30px rgba(40,60,100,.35);border-left:3px solid #5b80c0;animation:toastIn .2s ease}
  .toast.err{border-left-color:#ff453a}
  .toast.ok{border-left-color:var(--green)}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  /* skeleton de carga */
  .sk{background:linear-gradient(90deg,#eef1f6 25%,#f6f8fb 50%,#eef1f6 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:15px}
  @keyframes shimmer{to{background-position:-200% 0}}
  .empty{margin:auto;text-align:center;color:var(--dim);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .empty svg{width:46px;height:46px;opacity:.35}
  /* FAB scroll-to-bottom */
  #fab{position:absolute;right:16px;bottom:84px;width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid #e8edf4;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 5px 16px rgba(90,120,180,.22);z-index:5}
  #fab.show{display:flex}
  #fab svg{width:20px;height:20px;color:var(--acc)}
  /* estado de conexión del timbre */
  .conncta{color:#e0922a!important}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ===== MODAL DE CONTACTO (agregar mensaje perdido) ===== */
  .chead .who{cursor:pointer}
  .cmodal{position:fixed;inset:0;background:rgba(20,29,48,.42);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:200}
  .cmodal.show{display:flex;animation:fadein .15s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .cmcard{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:6px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -12px 44px rgba(40,60,100,.28);animation:slideup .24s cubic-bezier(.32,.72,0,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .cmgrab{width:38px;height:4px;border-radius:3px;background:#d7deea;margin:8px auto 4px}
  .cmhead{display:flex;align-items:center;gap:12px;padding:10px 2px 13px;border-bottom:1px solid #eef1f6}
  .cmava{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;box-shadow:0 3px 10px rgba(70,100,160,.2)}
  .cmhead b{font-size:17px;color:#1a2438;display:block;letter-spacing:-.2px}
  .cm-sub{font-size:12.5px;color:var(--acc);font-weight:500}
  .cmx{margin-left:auto;width:32px;height:32px;border-radius:50%;background:#f1f4f9;display:flex;align-items:center;justify-content:center;color:#7d8aa3;cursor:pointer;font-size:14px;flex:none}
  .cmbody{padding-top:16px}
  .cmtitle{font-size:16px;font-weight:700;color:#1a2438}
  .cmhint{font-size:12.5px;color:var(--dim);margin:4px 0 13px;line-height:1.4}
  .cmrow{display:flex;gap:9px;margin-bottom:11px}
  .cmtog{flex:1;padding:11px;border:1px solid #e3e9f4;border-radius:13px;background:#f6f8fc;color:#6b7589;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .08s}
  .cmtog:active{transform:scale(.97)}
  .cmtog.on{background:#e7f0ff;border-color:var(--acc);color:var(--acc)}
  #cm-texto{width:100%;min-height:72px;background:#f6f8fc;border:1px solid #e6ebf3;border-radius:15px;padding:12px 14px;font-size:15px;line-height:1.4;font-family:inherit;resize:none;color:var(--text);margin-bottom:11px}
  .cmf{flex:1;display:flex;flex-direction:column;font-size:11.5px;color:var(--dim);font-weight:700;gap:5px;text-transform:uppercase;letter-spacing:.3px}
  .cmf input{background:#f6f8fc;border:1px solid #e6ebf3;border-radius:12px;padding:10px 12px;font-size:14.5px;font-family:inherit;color:var(--text);text-transform:none}
  .cm-add{width:100%;margin-top:7px;padding:14px;border:none;border-radius:15px;background:linear-gradient(135deg,#3f86f5,#2f6df0);color:#fff;font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 6px 16px rgba(47,109,240,.32);transition:transform .08s}
  .cm-add:active{transform:scale(.98)}
</style>
</head>
<body>

<!-- PANTALLA 1: LISTA -->
<div class="screen" id="scr-lista">
  <div class="top"><h1>FyraChat</h1><div class="dot"><svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M12 2l1.7 4.8L18.5 8l-4.8 1.2L12 14l-1.2-4.8L6 8l4.3-1.2L12 2zm6 9l.9 2.6 2.6.9-2.6.9L18 18l-.9-2.6-2.6-.9 2.6-.9.9-2.6z"/></svg></div></div>
  <div class="search"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input id="buscar" placeholder="Buscar conversaciones" oninput="pintarLista()" autocomplete="off"></div>
  <div class="pills"><div class="pill on">Todos</div><div class="pill" id="pill-pend">Con sugerencia</div><div class="pill">Compradores</div></div>
  <div id="lista"></div>
</div>

<!-- PANTALLA 2: CHAT -->
<div class="screen" id="scr-chat">
  <div class="chead">
    <div class="back" onclick="cerrarChat()"><svg viewBox="0 0 13 22" fill="none"><path d="M11 1L2 11l9 10" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="ava" id="c-ava">?</div>
    <div class="who" onclick="abrirContacto()"><b id="c-nombre">—</b><span id="c-tel"></span></div>
  </div>
  <div id="msgs"></div>
  <div id="fab" onclick="document.getElementById('msgs').scrollTo({top:9e9,behavior:'smooth'})"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div id="obj-banner"><span class="ob-ic">↩</span><span id="obj-preview"></span><button class="ob-x" onclick="limpiarObjetivo()" title="Cancelar">✕</button></div>
  <div id="gen"><button onclick="sugerir()"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="vertical-align:-2px"><path d="M12 2l1.7 4.8L18.5 8l-4.8 1.2L12 14l-1.2-4.8L6 8l4.3-1.2L12 2z"/></svg> Generar sugerencia de Seb</button></div>
  <div id="copilot">
    <div class="tag"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 2l1.7 4.8L18.5 8l-4.8 1.2L12 14l-1.2-4.8L6 8l4.3-1.2L12 2z"/></svg> Respuesta sugerida <span class="int" id="c-int"></span></div>
    <textarea id="draft" readonly></textarea>
    <div class="cbtns">
      <button class="cb send" onclick="resolver('aprobado')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg> Enviar</button>
      <div class="cb-sec">
        <button class="cb s edit" id="btn-edit" onclick="toggleEdit()">Editar</button>
        <button class="cb s" onclick="sugerir()">Actualizar</button>
        <button class="cb s no" onclick="yoContesto()">Yo contesto</button>
      </div>
    </div>
  </div>
  <div id="seqbox"></div>
  <div class="inputbar">
    <textarea id="manual" rows="1" placeholder="Escribe un mensaje…"></textarea>
    <button id="sendman" onclick="enviarManual()"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
  </div>
</div>

<!-- MODAL DE CONTACTO: agregar mensaje perdido -->
<div class="cmodal" id="cmodal" onclick="if(event.target===this)cerrarContacto()">
  <div class="cmcard">
    <div class="cmgrab"></div>
    <div class="cmhead">
      <div class="cmava" id="cm-ava">?</div>
      <div style="min-width:0"><b id="cm-nombre">—</b><div class="cm-sub" id="cm-tel"></div></div>
      <div class="cmx" onclick="cerrarContacto()">✕</div>
    </div>
    <div class="cmbody">
      <div class="cmtitle">➕ Agregar mensaje perdido</div>
      <div class="cmhint">Rescata un mensaje que no llegó (se perdió en el cifrado). Cópialo tal cual de tu WhatsApp y ponle su hora — se acomoda solo en el chat.</div>
      <div class="cmrow">
        <button class="cmtog on" id="tog-in" onclick="setDir('in')">Él me escribió</button>
        <button class="cmtog" id="tog-out" onclick="setDir('out')">Yo le escribí</button>
      </div>
      <textarea id="cm-texto" placeholder="Pega aquí el mensaje…"></textarea>
      <div class="cmrow">
        <label class="cmf">Hora<input type="time" id="cm-hora"></label>
        <label class="cmf">Fecha<input type="date" id="cm-fecha"></label>
      </div>
      <button class="cm-add" id="cm-add" onclick="agregarMensaje()">Agregar al chat</button>
    </div>
  </div>
</div>

<script>
const API = '/api/seb-panel';
let TEL = null, QID = null, EDITANDO = false, SOLO_PEND = false, CHATS = [];
let OBJETIVO = null;   // mensaje del cliente seleccionado para "responder a" (msgId + texto)
const SENTINEL = '||SEQ||';   // separa los mensajes de una SECUENCIA del banco
let SEQ = null, SEQ_CONSUMED = false;   // secuencia del opener en curso
let ULTIMA_IN_SUGERIDA = 0, POLL = null, RENDERED_COUNT = -1;
// EL TIMBRE: WebSocket al bridge (estilo WhatsApp). Recibe mensajes nuevos SIN preguntarle a Turso.
const TIMBRE = 'wss://fat-simplified-sat-window.trycloudflare.com';
let WS = null;
let ENVIANDO = false;                          // anti doble-envío (BUG 4)
let CARGA_FRESCA = false;                       // primera carga de un chat → render limpio (BUG 1)
const recienEnviado = new Map();               // texto saliente → ts, para deduplicar el eco del timbre (BUG 7)
const normTs = t => { t = Number(t) || 0; return t > 1e12 ? Math.floor(t / 1000) : t; };  // todo a segundos
const hashT = s => { let h = 0; s = String(s || ''); for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return h; };
// clave única de burbuja: por FOLIO (estable) si viene; si no, cae a contenido+hora.
const claveMsg = m => m.msg_id ? ('f:' + m.msg_id) : (m.direccion + '|' + normTs(m.timestamp) + '|' + hashT(m.mensaje));
// 🚩 marcar un mensaje REAL para training ("procesa el training" lo lee de fyrachat_flags)
async function flagMsg(e, btn){
  e.stopPropagation(); e.preventDefault();
  if (btn.classList.contains('on') || !TEL) return;
  const nota = prompt('🚩 ¿Qué está mal / qué esperabas? (opcional)');
  if (nota === null) return;
  try {
    const r = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'flag_msg', telefono: TEL, texto: decodeURIComponent(btn.dataset.txt||''), direccion: btn.dataset.dir||'', nota: nota||'' }) });
    const d = await r.json();
    if (d.ok) { btn.classList.add('on'); btn.textContent = '🚩'; btn.title = 'marcado para training'; }
    else alert('no se pudo marcar: ' + (d.error||''));
  } catch(err){ alert('red: ' + err.message); }
}
const CHECK = '<span class="tick read"><svg viewBox="0 0 18 12"><path d="M1 6.2l3 3.1L8.6 3" fill="none" stroke="#2f6df0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 9.3L12.6 3" fill="none" stroke="#2f6df0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
function burbujaHTML(m, prevDir){
  const lado = m.direccion==='in'?'in':'out';
  const cls = 'bub '+lado+(prevDir===m.direccion ? ' grouped' : ' first-of-group');
  const src = m.origen_envio ? '<span class="src">'+m.origen_envio+'</span>' : '';
  // Seleccionable para "responder a / ejecutar": mensajes de TEXTO con folio real (cliente
  // O tuyos). En los tuyos (out), Seb EJECUTA lo que pusiste (cita, cotizar, etc.).
  const selable = m.msg_id && String(m.msg_id).indexOf('opt:') !== 0 && m.tipo !== 'image' && m.tipo !== 'location';
  const sel = selable ? (' data-mid="'+m.msg_id+'" data-txt="'+encodeURIComponent(m.mensaje||'')+'" data-dir="'+lado+'"') : '';
  const media = (m.tipo==='image') ? ' media' : '';
  let cont;
  if (m.tipo==='image'){                                  // CAPTURA del punto (control): imagen real
    const r = (m.mensaje||'').match(/^ubic-img:(\d+)/);
    const isrc = r ? (API+'?action=ubic_img&auto_id='+r[1]) : (m.mensaje||'');
    cont = '<a href="'+isrc+'" target="_blank" rel="noopener"><img class="bmedia" src="'+isrc+'" alt="mapa del punto" loading="lazy"></a>';
  } else if (m.tipo==='location'){                         // PIN (control): card de ubicación
    const p = (m.mensaje||'').split('|||'); const nom = esc(p[0]||'Ubicación'); const link = (p[3]||'').trim();
    cont = '<div class="bloc">📍 <b>'+nom+'</b>'+(link?'<a href="'+esc(link)+'" target="_blank" rel="noopener">Ver en Maps</a>':'')+'</div>';
  } else {
    cont = esc(m.mensaje);
  }
  const flagBtn = '<button class="flagb" title="🚩 marcar para training" data-dir="'+lado+'" data-txt="'+encodeURIComponent(m.mensaje||'')+'" onclick="flagMsg(event,this)">🚩</button>';
  return '<div class="'+cls+media+'" data-k="'+claveMsg(m)+'" data-d="'+lado+'"'+sel+'>'+flagBtn+cont+
         '<span class="t">'+src+hora(m.timestamp)+(lado==='out'?' '+CHECK:'')+'</span></div>';
}
// Etiqueta de día para los separadores
function diaLabel(ts){
  const d = new Date(normTs(ts)*1000), hoy = new Date(), ayer = new Date(); ayer.setDate(hoy.getDate()-1);
  if (d.toDateString()===hoy.toDateString()) return 'HOY';
  if (d.toDateString()===ayer.toDateString()) return 'AYER';
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});
}
// Render completo con separadores de fecha + agrupación
function renderTodo(msgs){
  let html='', prevDir=null, prevDay=null;
  for (const m of msgs){
    const day = new Date(normTs(m.timestamp)*1000).toDateString();
    if (day!==prevDay){ html += '<div class="daysep">'+diaLabel(m.timestamp)+'</div>'; prevDir=null; }
    html += burbujaHTML(m, prevDir);
    prevDir = m.direccion; prevDay = day;
  }
  return html;
}
function ultimoLado(ms){ const b = ms.querySelector('.bub:last-of-type'); return b ? b.dataset.d : null; }
// Inserta UNA burbuja en vivo (con dedup, agrupación, animación y auto-scroll inteligente)
function insertarBurbuja(m){
  const ms = document.getElementById('msgs');
  if (ms.querySelector('[data-k="'+claveMsg(m)+'"]')) return false;     // ya está
  const cerca = ms.scrollHeight - ms.scrollTop - ms.clientHeight < 90;
  let h = burbujaHTML(m, ultimoLado(ms)).replace('class="bub','class="anim bub');
  ms.insertAdjacentHTML('beforeend', h);
  if (cerca || m.direccion==='out') ms.scrollTo({top:9e9, behavior:'smooth'});  // solo baja si ya estabas abajo
  else document.getElementById('fab').classList.add('show');                     // si lees arriba, FAB
  return true;
}
// Pinta una burbuja SALIENTE al instante (optimistic UI). Le pone un FOLIO temporal
// para poder quitarla si el envío falla (y deduplica su eco por texto).
function pintarOptimista(texto){
  const tempId = 'opt:' + Date.now() + '-' + Math.floor(Math.random() * 1e6);
  insertarBurbuja({ direccion:'out', mensaje:texto, timestamp:Date.now(), msg_id: tempId });
  recienEnviado.set(texto, Date.now());
  if (navigator.vibrate) { try { navigator.vibrate(20); } catch(e){} }   // sensación de "enviado"
  return tempId;
}
// Si el envío NO se concretó, quita la burbuja fantasma (y libera el dedup del eco).
function quitarOptimista(tempId, texto){
  if (tempId){ const el = document.querySelector('#msgs [data-k="f:' + tempId + '"]'); if (el) el.remove(); }
  if (texto) recienEnviado.delete(texto);
}
function estadoTimbre(ok){
  const el = document.getElementById('c-tel'); if(!el) return;
  if (ok){ el.textContent = TEL ? ('+'+TEL) : ''; el.classList.remove('conncta'); }
  else { el.textContent = 'conectando…'; el.classList.add('conncta'); }
}

// degradados azul / teal / verde / cielo (nada de morado) — avatar "real", no look de IA
const grads = [['#5b9ef0','#2f6df0'],['#43c6c0','#2f97d0'],['#5fd6a0','#2fb886'],['#6db8f5','#3f8fe0'],['#7ad0c8','#46a6d8'],['#6a9bf0','#3f6fe0'],['#8fd4b0','#4fb890']];
const colorDe = t => { const g = grads[String(t).split('').reduce((a,c)=>a+c.charCodeAt(0),0) % grads.length]; return 'linear-gradient(135deg,'+g[0]+','+g[1]+')'; };
const hora = ts => { const d = new Date(ts < 1e12 ? ts*1000 : ts); const hoy = new Date().toDateString()===d.toDateString();
  return hoy ? d.toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit'}) : d.toLocaleDateString('es-MX',{day:'numeric',month:'short'}); };
const toast = (m,tipo) => { const t=document.createElement('div'); t.className='toast '+(tipo || (/error|no se|⚠|falló|red/i.test(m)?'err':/enviad|✅|listo/i.test(m)?'ok':'')); t.textContent=m; document.body.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .25s';setTimeout(()=>t.remove(),250);},2600); };

// ===== NO LEÍDOS estilo WhatsApp: el número solo sale si hay mensajes nuevos que NO has abierto =====
const LEIDO_KEY='fyrachat_leido', UNREAD_KEY='fyrachat_unread';
let lastRead = {}, unread = {};
try { lastRead = JSON.parse(localStorage.getItem(LEIDO_KEY)||'{}'); unread = JSON.parse(localStorage.getItem(UNREAD_KEY)||'{}'); } catch(e){}
function persistUnread(){ try{ localStorage.setItem(LEIDO_KEY,JSON.stringify(lastRead)); localStorage.setItem(UNREAD_KEY,JSON.stringify(unread)); }catch(e){} }
function marcarLeido(tel){ unread[tel]=0; lastRead[tel]=Math.floor(Date.now()/1000); persistUnread(); }   // abriste el chat → leído
// reconcilia el contador con lo que devuelve el backend (p.ej. mensajes que llegaron con la app cerrada)
function reconciliarNoLeidos(){
  for (const c of CHATS){
    const t = normTs(c.ult_ts);
    if (c.ult_dir==='out') unread[c.telefono]=0;                                                 // tú contestaste → leído
    else if (c.ult_dir==='in' && t > (lastRead[c.telefono]||0)){ if (!unread[c.telefono]) unread[c.telefono]=1; }
    else unread[c.telefono]=0;
  }
  persistUnread();
}
async function cargarLista(){
  const r = await fetch(API+'?action=chats').then(x=>x.json());
  CHATS = r.chats || [];
  reconciliarNoLeidos();
  pintarLista();
}

// Conecta el TIMBRE (WebSocket). Si se cae, reconecta solo. Al reconectar, re-sincroniza el chat abierto.
function connectTimbre(){
  try { WS = new WebSocket(TIMBRE); } catch(e){ return setTimeout(connectTimbre, 5000); }
  WS.onopen = () => { estadoTimbre(true); if (TEL) cargarChat(); };   // al (re)conectar, ponerse al día
  WS.onmessage = (ev) => { let d; try{ d=JSON.parse(ev.data); }catch(e){ return; } if (d.tipo==='mensaje') onTimbre(d); };
  WS.onclose = () => { estadoTimbre(false); setTimeout(connectTimbre, 4000); };
  WS.onerror = () => { try{ WS.close(); }catch(e){} };
}
// Cuando suena el timbre con un mensaje nuevo: actualiza la lista y, si es el chat abierto, lo pinta al instante.
function onTimbre(d){
  // 1) LISTA: actualizar preview y subir el chat arriba (sin leer Turso)
  let ch = CHATS.find(c => c.telefono === d.telefono);
  if (!ch){ ch = { telefono:d.telefono, nombre:d.nombre||('+'+String(d.telefono).slice(0,3)+' '+String(d.telefono).slice(-10)), pendientes:0 }; }
  ch.ult_msg = String(d.mensaje||'').slice(0,90); ch.ult_dir = d.direccion; ch.ult_ts = d.timestamp;
  CHATS = CHATS.filter(c => c.telefono !== d.telefono); CHATS.unshift(ch);
  // contador de no leídos (estilo WhatsApp): sube solo si es entrante y NO tienes ese chat abierto
  if (d.direccion==='in'){
    if (TEL === d.telefono) marcarLeido(d.telefono);                       // lo estás viendo → leído
    else { unread[d.telefono] = (unread[d.telefono]||0) + 1; persistUnread(); }
  } else { unread[d.telefono]=0; persistUnread(); }                         // saliente → leído
  if (!document.getElementById('scr-chat').classList.contains('open')) pintarLista();
  // 2) CHAT ABIERTO: pintar la burbuja nueva al instante (con dedup)
  if (TEL === d.telefono){
    // si es el ECO de un mensaje que YO acabo de mandar (ya pintado optimista) → saltar
    if (d.direccion==='out' && recienEnviado.has(d.mensaje) && (Date.now()-recienEnviado.get(d.mensaje) < 30000)){
      recienEnviado.delete(d.mensaje); return;
    }
    insertarBurbuja(d);
    // SOLO on-demand (ahorra tokens): YA NO se auto-sugiere. Si llega un mensaje del comprador,
    // solo aparece el botón "Generar" — TÚ decides si Seb responde.
    if (d.direccion==='in' && !EDITANDO){
      document.getElementById('copilot').classList.remove('show');
      document.getElementById('gen').classList.add('show');
    }
  }
}
function pintarLista(){
  const el = document.getElementById('lista');
  const q = (document.getElementById('buscar')?.value || '').trim().toLowerCase();
  let rows = SOLO_PEND ? CHATS.filter(c=>c.pendientes>0) : CHATS;
  if (q) rows = rows.filter(c => (c.nombre||'').toLowerCase().includes(q) || (c.ult_msg||'').toLowerCase().includes(q) || String(c.telefono||'').includes(q));
  el.innerHTML = rows.map(c => { const n = unread[c.telefono]||0; return `
    <div class="chatrow${n>0?' unread':''}" onclick="abrirChat('${c.telefono}','${(c.nombre||'').replace(/'/g,'')}')">
      <div class="ava" style="background:${colorDe(c.telefono)}">${(c.nombre||'?')[0].toUpperCase()}</div>
      <div class="meta">
        <div class="n"><span>${c.nombre}</span><time class="${n>0?'hot':''}">${hora(c.ult_ts)}</time></div>
        <div class="p"><span style="overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1">${c.ult_dir==='out'?'✓ ':''}${c.ult_msg||''}</span></div>
      </div>
      ${n>0 ? '<div class="badge-n">'+(n>99?'99+':n)+'</div>' : ''}
    </div>`; }).join('') || `<div style="padding:50px;text-align:center;color:var(--dim)">${q?'Sin resultados':'Sin chats'}</div>`;
}
document.getElementById('pill-pend').onclick = function(){ SOLO_PEND=!SOLO_PEND; this.classList.toggle('on',SOLO_PEND); pintarLista(); };

async function abrirChat(tel, nombre){
  TEL = tel; QID = null; EDITANDO = false; ULTIMA_IN_SUGERIDA = 0; RENDERED_COUNT = -1;
  OBJETIVO = null; document.getElementById('obj-banner').classList.remove('show');
  marcarLeido(tel); pintarLista();                   // abriste el chat → borra el contador AL INSTANTE (la lista está detrás)
  document.getElementById('c-nombre').textContent = nombre || tel;
  document.getElementById('c-tel').textContent = '+'+tel;
  document.getElementById('c-ava').textContent = (nombre||'?')[0].toUpperCase();
  document.getElementById('c-ava').style.background = colorDe(tel);
  // LIMPIAR AL INSTANTE: nunca se ve el chat anterior (BUG 1) + skeleton de carga + limpiar copiloto (BUG 8)
  document.getElementById('msgs').innerHTML = '<div style="display:flex;flex-direction:column;gap:9px;padding:16px 0">'+
    '<div class="sk" style="height:36px;width:58%;align-self:flex-start"></div>'+
    '<div class="sk" style="height:34px;width:42%;align-self:flex-end"></div>'+
    '<div class="sk" style="height:50px;width:66%;align-self:flex-start"></div>'+
    '<div class="sk" style="height:34px;width:38%;align-self:flex-end"></div></div>';
  document.getElementById('fab').classList.remove('show');
  document.getElementById('copilot').classList.remove('show');
  document.getElementById('gen').classList.remove('show');
  document.getElementById('draft').value = '';
  SEQ = null; SEQ_CONSUMED = false; document.getElementById('seqbox').classList.remove('show');
  document.getElementById('scr-chat').classList.add('open');
  CARGA_FRESCA = true;
  cargarChat();
}

// Carga/refresca el chat. Token anti-stale (no pinta respuestas de un chat que ya cerraste).
async function cargarChat(){
  const mio = TEL; if (!mio) return;
  let r;
  try { r = await fetch(API+'?action=chat&telefono='+encodeURIComponent(mio)).then(x=>x.json()); }
  catch(e){ return; }
  if (TEL !== mio) return;                            // BUG 8: cambiaste de chat → descartar respuesta vieja
  const msgs = r.mensajes || [];
  const ms = document.getElementById('msgs');
  if (CARGA_FRESCA){                                  // primera carga → render limpio (quita el "cargando…")
    CARGA_FRESCA = false;
    ms.innerHTML = msgs.length ? renderTodo(msgs)
      : '<div class="empty"><svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.4 8.4 0 01-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1121 11.5z" stroke="currentColor" stroke-width="1.6"/></svg><div>Sin mensajes aún</div></div>';
    ms.scrollTo({top:9e9});
    document.getElementById('fab').classList.remove('show');
  } else {                                            // MERGE: agrega solo las que falten, no borra las vivas (BUG 7)
    for (const m of msgs){ insertarBurbuja(m); }
  }
  RENDERED_COUNT = msgs.length;
  const ultimo = msgs[msgs.length-1];
  const ultimoIn = [...msgs].reverse().find(m => m.direccion==='in');
  // SOLO on-demand (ahorra tokens): NUNCA auto-sugerir. Muestra el borrador ya guardado
  // (si existe) o el botón "Generar" para que TÚ lo dispares.
  if (!EDITANDO) mostrarBorrador(r.borrador);
}
function esc(s){
  let t = String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:#53bdeb;text-decoration:underline">$1</a>');
}
function cerrarChat(){ if(POLL){clearInterval(POLL); POLL=null;} TEL=null; document.getElementById('scr-chat').classList.remove('open'); cargarLista(); }

// ===== MODAL DE CONTACTO: agregar mensaje perdido =====
let CM_DIR = 'in';
function setDir(d){ CM_DIR=d; document.getElementById('tog-in').classList.toggle('on',d==='in'); document.getElementById('tog-out').classList.toggle('on',d==='out'); }
function abrirContacto(){
  if(!TEL) return;
  document.getElementById('cm-nombre').textContent = document.getElementById('c-nombre').textContent;
  document.getElementById('cm-tel').textContent = '+'+TEL;
  const av = document.getElementById('cm-ava'); av.textContent = document.getElementById('c-ava').textContent; av.style.background = colorDe(TEL);
  const now = new Date();
  document.getElementById('cm-fecha').value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('cm-hora').value = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('cm-texto').value = '';
  setDir('in');
  document.getElementById('cmodal').classList.add('show');
}
function cerrarContacto(){ document.getElementById('cmodal').classList.remove('show'); }
async function agregarMensaje(){
  const texto = document.getElementById('cm-texto').value.trim();
  if(!texto){ toast('Escribe el mensaje primero'); return; }
  const hora = document.getElementById('cm-hora').value;
  const fecha = document.getElementById('cm-fecha').value;
  const btn = document.getElementById('cm-add'); const mio = TEL;
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Agregando…';
  try {
    const r = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'agregar_mensaje', telefono:mio, texto, hora, fecha, direccion:CM_DIR})}).then(x=>x.json());
    if(r.ok){
      cerrarContacto();
      toast('✅ Mensaje rescatado','ok');
      if(TEL===mio){ CARGA_FRESCA=true; cargarChat(); }            // re-render en orden
    } else { toast('⚠️ '+(r.motivo||r.error||'no se pudo')); }
  } catch(e){ toast('⚠️ Error de red'); }
  btn.disabled = false; btn.textContent = 'Agregar al chat';
}

function mostrarBorrador(b){
  const cop = document.getElementById('copilot'), gen = document.getElementById('gen'), seq = document.getElementById('seqbox');
  // No pisar una SECUENCIA a medio enviar si el server ya no devuelve pendiente
  // (la sugerencia se "consume" al primer mensaje → quedaría null en el siguiente poll).
  if (SEQ && SEQ.some(s => !s.enviado) && (!b || !b.borrador)) return;
  if (b && b.borrador){
    QID = b.id;
    if (String(b.borrador).indexOf(SENTINEL) !== -1){     // → SECUENCIA del banco
      mostrarSecuencia(String(b.borrador), b.intencion);
      cop.classList.remove('show'); gen.classList.remove('show');
      return;
    }
    SEQ = null; seq.classList.remove('show');
    document.getElementById('draft').value = b.borrador;
    document.getElementById('draft').setAttribute('readonly','');
    document.getElementById('c-int').textContent = b.intencion || '';
    cop.classList.add('show'); gen.classList.remove('show');
  } else { SEQ = null; cop.classList.remove('show'); seq.classList.remove('show'); gen.classList.add('show'); }
}

// Pinta la SECUENCIA: una tarjeta por mensaje, cada una con su botón Enviar.
// Sebastián pica enviar, enviar, enviar — se mandan como mensajes separados, en orden.
function mostrarSecuencia(raw, intencion){
  const segs = raw.split(SENTINEL).map(s => s.trim()).filter(Boolean);
  SEQ = segs.map(t => ({ texto:t, enviado:false }));
  SEQ_CONSUMED = false;
  const box = document.getElementById('seqbox');
  let html = '<div class="seqtag"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 2l1.7 4.8L18.5 8l-4.8 1.2L12 14l-1.2-4.8L6 8l4.3-1.2L12 2z"/></svg> Secuencia de Seb · pícale Enviar en orden <span class="int">'+esc0(intencion||'')+'</span></div>';
  SEQ.forEach((s,i)=>{
    html += '<div class="seqcard" id="seqc-'+i+'"><span class="seqn">'+(i+1)+'</span>'
      + '<textarea class="seqtx" id="seqtx-'+i+'" rows="1"></textarea>'
      + '<button class="seqbtn" id="seqb-'+i+'" onclick="enviarSeg('+i+')">Enviar</button></div>';
  });
  html += '<div class="seqfoot"><button onclick="cerrarSecuencia()">Descartar secuencia</button></div>';
  box.innerHTML = html;
  box.classList.add('show');     // mostrar ANTES de medir (oculto, scrollHeight=0 → clip)
  // El texto se asigna por .value (puede traer saltos de línea, emojis, comillas)
  SEQ.forEach((s,i)=>{ const tx=document.getElementById('seqtx-'+i); if(tx){ tx.value=s.texto; autoSizeTA(tx); tx.addEventListener('input',()=>autoSizeTA(tx)); } });
}
function autoSizeTA(t){ t.style.height='auto'; t.style.height=Math.max(38, Math.min(t.scrollHeight,120))+'px'; }
const esc0 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function enviarSeg(i){
  if (!SEQ || !SEQ[i] || SEQ[i].enviado) return;
  const tx = document.getElementById('seqtx-'+i);
  const texto = (tx.value||'').trim(); if(!texto) return;
  const btn = document.getElementById('seqb-'+i);
  btn.disabled = true; btn.textContent='…';
  const optId = pintarOptimista(texto);
  const body = { action:'manual_directo', telefono: TEL, texto };
  if (!SEQ_CONSUMED && QID) body.consume_qid = QID;     // el 1er mensaje consume la sugerencia
  try {
    const r = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(x=>x.json());
    if (!r.ok || !r.enviado){ quitarOptimista(optId, texto); btn.disabled=false; btn.textContent='Enviar';
      toast('⚠️ No se envió: '+(r.error_envio||r.error||'WhatsApp no conectado')); return; }
    if (body.consume_qid){ SEQ_CONSUMED = true; QID = null; }   // consumida → los demás van directos
    SEQ[i].enviado = true;
    document.getElementById('seqc-'+i).classList.add('sent');
    tx.setAttribute('readonly',''); btn.textContent='✓ Enviado';
    const next = SEQ.findIndex(s=>!s.enviado);
    if (next < 0) setTimeout(cerrarSecuencia, 650);            // todos enviados → cerrar
    else { const nb=document.getElementById('seqb-'+next); if(nb) nb.focus(); }
  } catch(e){ quitarOptimista(optId, texto); btn.disabled=false; btn.textContent='Enviar'; toast('⚠️ No se envió (red)'); }
}
function cerrarSecuencia(){
  SEQ = null;
  document.getElementById('seqbox').classList.remove('show');
  document.getElementById('gen').classList.add('show');
}

async function sugerir(ultimoIn){
  const mio = TEL;
  const btn = document.querySelector('#gen button');
  if (btn){ btn.innerHTML = '<span class="spin"></span> Seb está pensando…'; btn.disabled = true; }
  try {
    const r = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'sugerir', telefono: mio, ultimo_in: ultimoIn || null,
        objetivo: OBJETIVO ? OBJETIVO.texto : null, objetivo_msgid: OBJETIVO ? OBJETIVO.msgId : null})}).then(x=>x.json());
    if (TEL === mio){                                  // BUG 8: solo pinta si SIGUES en el mismo chat
      if (r.ok){ mostrarBorrador({id:r.queue_id, borrador:r.borrador, intencion:r.intencion}); }
      else if (r.escalar){ mostrarBorrador(null); toast('⚠️ Seb escala: '+(r.motivo||'requiere humano')); }
      else toast('Error: '+(r.error||'?'));
    }
  } catch(e){ /* red puede fallar; el botón sigue disponible */ }
  if (btn){ btn.innerHTML = '🤖 Generar sugerencia de Seb'; btn.disabled = false; }
}

function toggleEdit(){
  const d = document.getElementById('draft');
  if (!EDITANDO){ d.removeAttribute('readonly'); d.focus(); EDITANDO = true;
    document.getElementById('btn-edit').textContent = '✓ Enviar editado';
  } else { resolver('editado'); }
}
function yoContesto(){
  document.getElementById('copilot').classList.remove('show');
  document.getElementById('manual').focus();
  toast('Escribe tu respuesta abajo — quedará registrada como manual');
}

async function resolver(tipo){
  if (ENVIANDO) return; ENVIANDO = true;               // BUG 4: anti doble-clic
  const texto = document.getElementById('draft').value;
  const btns = document.querySelectorAll('#copilot .cb');
  btns.forEach(b => { b.disabled = true; b.style.opacity = .5; });   // BUG 5: feedback
  const optId = pintarOptimista(texto);                // BUG 3: el mensaje aparece YA, sin recargar
  document.getElementById('copilot').classList.remove('show');
  document.getElementById('gen').classList.remove('show');
  EDITANDO = false;
  try {
    const r = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'resolver', queue_id: QID, resolucion: tipo, texto_final: texto})}).then(x=>x.json());
    if (!r.ok){ quitarOptimista(optId, texto); toast('⚠️ No se envió: '+(r.error||'?')); }
    else if (!r.enviado){ quitarOptimista(optId, texto); toast('⚠️ No se envió: '+(r.error_envio||'WhatsApp no conectado')); }
    else { QID = null; limpiarObjetivo(); }   // sugerencia CONSUMIDA → limpiar QID + objetivo (los manuales van directo)
  } catch(e){ quitarOptimista(optId, texto); toast('⚠️ No se envió (red)'); }
  btns.forEach(b => { b.disabled = false; b.style.opacity = 1; });
  ENVIANDO = false;
}

async function enviarManual(){
  if (ENVIANDO) return;
  const inp = document.getElementById('manual');
  const texto = inp.value.trim(); if (!texto) return;
  ENVIANDO = true;
  const sb = document.getElementById('sendman'); if(sb){ sb.disabled=true; sb.style.opacity=.5; }
  inp.value=''; inp.style.height='auto';
  const optId = pintarOptimista(texto);                // aparece YA
  const usarQueue = QID && document.getElementById('copilot').classList.contains('show')===false;
  const mandarDirecto = () => fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'manual_directo', telefono: TEL, texto})}).then(x=>x.json());
  try {
    let r;
    if (usarQueue){
      r = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'resolver', queue_id: QID, resolucion:'manual', texto_final: texto})}).then(x=>x.json());
      // Si esa sugerencia YA estaba enviada (QID viejo) → manda el mensaje DIRECTO.
      // Nunca error, nunca pérdida: el manual siempre sale.
      if (r && r.ya_enviado){ QID = null; r = await mandarDirecto(); }
      else if (r && r.enviado){ QID = null; }   // resolvió la sugerencia → consúmela
    } else {
      r = await mandarDirecto();
    }
    if (!r.ok){ quitarOptimista(optId, texto); toast('⚠️ No se envió: '+(r.error||'?')); }
    else if (!r.enviado){ quitarOptimista(optId, texto); toast('⚠️ No se envió: '+(r.error_envio||'WhatsApp no conectado')); }
  } catch(e){ quitarOptimista(optId, texto); toast('⚠️ No se envió (red)'); }
  if(sb){ sb.disabled=false; sb.style.opacity=1; }
  ENVIANDO = false;
}

cargarLista();
connectTimbre();   // 🔔 conecta el timbre (WebSocket) — mensajes en vivo sin quemar lecturas
// Fallback lento por si el timbre se cae: refresca la lista cada 90s SOLO en la pantalla de lista.
setInterval(()=>{ if(!document.getElementById('scr-chat').classList.contains('open')) cargarLista(); }, 90000);
// FAB scroll-to-bottom: aparece si lees historial arriba
document.getElementById('msgs').addEventListener('scroll', function(){
  document.getElementById('fab').classList.toggle('show', this.scrollHeight - this.scrollTop - this.clientHeight > 280);
});
// "RESPONDER A": tocar un mensaje del CLIENTE lo marca como objetivo de la sugerencia.
document.getElementById('msgs').addEventListener('click', function(e){
  const bub = e.target.closest('.bub[data-mid]');
  if (!bub) return;
  const mid = bub.dataset.mid;
  if (OBJETIVO && OBJETIVO.msgId === mid){ limpiarObjetivo(); return; }   // tocar otra vez = quitar
  seleccionarObjetivo(mid, decodeURIComponent(bub.dataset.txt || ''), bub.dataset.dir);
});
function seleccionarObjetivo(mid, texto, dir){
  document.querySelectorAll('#msgs .bub.sel-obj').forEach(b=>b.classList.remove('sel-obj'));
  OBJETIVO = { msgId: mid, texto: texto, dir: dir };
  const bub = document.querySelector('#msgs .bub[data-mid="'+mid+'"]');
  if (bub) bub.classList.add('sel-obj');
  // Tu mensaje (out) = Seb EJECUTA lo que pusiste; mensaje del cliente (in) = responder a.
  const esMio = dir === 'out';
  document.querySelector('#obj-banner .ob-ic').textContent = esMio ? '⚡' : '↩';
  document.getElementById('obj-preview').textContent = (esMio ? 'Ejecutar: ' : '') + (texto.length>64 ? texto.slice(0,64)+'…' : texto);
  document.getElementById('obj-banner').classList.add('show');
}
function limpiarObjetivo(){
  OBJETIVO = null;
  document.querySelectorAll('#msgs .bub.sel-obj').forEach(b=>b.classList.remove('sel-obj'));
  document.getElementById('obj-banner').classList.remove('show');
}
// Input que crece con el texto (como WhatsApp)
const _man = document.getElementById('manual');
_man.addEventListener('input', () => { _man.style.height='auto'; _man.style.height=Math.min(_man.scrollHeight,110)+'px'; });
_man.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviarManual(); } });
</script>
